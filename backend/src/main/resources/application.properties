spring.application.name=JobVault
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/jobvault?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=JobVaultUniversitySubmissionJwtSecretKeyForSpringBootSecurity2026
app.jwt.expiration-ms=86400000
app.cors.allowed-origin=http://localhost:3000
